    <body>
        <header>
            <div class="header">
                <p data-aos="zoom-in">Free Shipping For All Orders</p>
                <div class="header_header">
                    <img src="Images/B.K__1_-removebg-preview.png" alt="ArivoStyle Logo" data-aos="zoom-in">
                    <nav id="navbar">
                        <a href="index.html"><h1 data-aos="zoom-in">ArivoStyle</h1></a>

        <div class="booking" id="booking">
            <h1>Contact Us</h1>
            <p>Global fashion. Local attitude. Shop Arivo and wear the trends that move the world.</p>
            <form>
                <input type="text" placeholder="*Name" required/>
                <input type="email" placeholder="*Email" required/>
                <input type="tel" placeholder="*Phone Number" required/>
                <input type="time" placeholder="*Preferred Time" required/>
                <input type="date" placeholder="*Preferred Date" required/>
                <textarea placeholder="*Message" required></textarea>
                <button type="submit">Submit</button>
            </form>
